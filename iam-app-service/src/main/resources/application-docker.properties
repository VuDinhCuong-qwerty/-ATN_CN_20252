server.port=8080

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//iam-oracle:1521/AUTHPDB1}
spring.datasource.username=${DB_USERNAME:auth_user1}
spring.datasource.password=${DB_PASSWORD:Auth123456}

spring.data.redis.host=${REDIS_HOST:iam-redis}
