kafka.bootstrap-servers=${KAFKA_SERVERS:kafka-1:9092,kafka-2:9092,kafka-3:9092}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_ISSUER_URI:http://host.docker.internal:8888/ms-internal-iam/auth}
