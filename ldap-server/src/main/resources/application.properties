spring.application.name=ldap-server
# Không có spring-boot-starter-web → không có Tomcat, khai báo tường minh
spring.main.web-application-type=none

# ── Oracle DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/AUTHPDB1
spring.datasource.username=auth_user1
spring.datasource.password=Auth123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── Embedded LDAP Server ──────────────────────────────────────────────────────
ldap.server.port=10389
ldap.server.suffix=dc=iam,dc=bank,dc=vn
ldap.server.work-dir=${java.io.tmpdir}/apacheds-iam
ldap.server.allow-anonymous=false
ldap.server.max-size-limit=500

# Admin bind DN (used by LDAP clients to authenticate)
ldap.server.admin.dn=uid=admin,ou=system
ldap.server.admin.password=secret

# App mà user phải có AUTH_APP_PERMISSION mới được BIND thành công.
# Approach B: service code đến từ DN path (ou=gitlab-server,ou=users,...) — không cần config ở đây.
# Để trống = không enforce khi dùng old-style DN (backward compat).
ldap.server.required-app=

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.iam.ldap=DEBUG
logging.level.org.apache.directory=WARN
