# Oracle — ket noi tu container ra may host
spring.datasource.url=jdbc:oracle:thin:@//host.docker.internal:1521/AUTHPDB1
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}

# OAuth2 Resource Server — iam-auth-service container (auth luon la 8888)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://iam-auth-service:8888/ms-internal-iam/auth/jwks

# OAuth2 Client — client_credentials
spring.security.oauth2.client.registration.iam-service.client-secret=${IAM_CLIENT_SECRET}
spring.security.oauth2.client.provider.iam-service.token-uri=http://iam-auth-service:8888/ms-internal-iam/auth/token

# Identity service — container internal port 8080
identity.service.uri=http://iam-identity-service:8080/iam-identity-service

# CORS — chi can cho localhost:8085 (Angular da duoc serve tu cung container)
cors.allowed-origins=http://localhost:8085
