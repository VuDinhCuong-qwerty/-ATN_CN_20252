spring.application.name=iam-notify-service
server.port=8083
server.servlet.context-path=/iam-notify-service

# ── Kafka (custom prefix — không dùng spring.kafka.*) ─────────────────────────
kafka.bootstrap-servers=localhost:19092,localhost:19093,localhost:19094
kafka.sasl.username=kafka_user
kafka.sasl.password=kafka@123456

# ── Oracle (read-only: lookup email nhân viên từ AUTH_USER) ───────────────────
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/AUTHPDB1
spring.datasource.username=auth_user1
spring.datasource.password=Auth123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ── Mail (SMTP Gmail) ─────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:cuongdaynemano@gmail.com}
spring.mail.password=${MAIL_PASSWORD:etpaliiporvypuev}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── Notify config ─────────────────────────────────────────────────────────────
notify.mail.from=${MAIL_FROM:noreply@iam-banking.vn}
notify.mail.from-name=IAM Banking System
notify.mail.portal-url=${PORTAL_URL:http://localhost:4200}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.iam.notify=DEBUG
logging.level.org.springframework.kafka=INFO
