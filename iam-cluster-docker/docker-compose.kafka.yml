# =============================================================================
# Kafka Cluster — 3 brokers, KRaft mode (no Zookeeper), SASL/PLAIN auth
# Image: apache/kafka (official Apache Software Foundation)
# =============================================================================
#
# TẠI SAO KAFKA BỊ RESTART LIÊN TỤC (lỗi cũ đã fix):
#   Nguyên nhân 1: Image bitnami/kafka:3.7 không tồn tại trên Docker Hub
#                  → Bitnami đã rời Docker Hub, phải dùng apache/kafka
#   Nguyên nhân 2: Khi SASL enabled, configure script yêu cầu KAFKA_OPTS
#                  phải chứa "-Djava.security.auth.login.config=<path>"
#                  → Script gọi ensure KAFKA_OPTS, nếu biến không set thì
#                    bash báo lỗi "!1: unbound variable" và container crash
#   Nguyên nhân 3: JAAS config không thể truyền inline qua env var với
#                  apache/kafka image → phải dùng file riêng và mount vào
#   Fix: tạo config/kafka-jaas.conf + set KAFKA_OPTS trỏ đến file đó
#
# =============================================================================
# KHỞI ĐỘNG:
#   docker compose -f docker-compose.yml -f docker-compose.kafka.yml up -d
#
# DỪNG:
#   docker compose -f docker-compose.yml -f docker-compose.kafka.yml down
#
# XEM LOG:
#   docker logs kafka-1 -f
#
# =============================================================================
# BOOTSTRAP SERVERS:
#   Nội bộ  : kafka-1:9092,kafka-2:9092,kafka-3:9092
#   Từ host : localhost:19092,localhost:19093,localhost:19094
#
# SASL credentials (xem config/kafka-jaas.conf):
#   username : kafka_user
#   password : kafka@123456
#   mechanism: PLAIN
#
# =============================================================================
# CÁC LỆNH HAY DÙNG (exec vào kafka-1):
#   docker exec -it kafka-1 bash
#
#   # --- Tạo client config (chạy 1 lần trong session) ---
#   cat > /tmp/client.properties << 'EOF'
#   security.protocol=SASL_PLAINTEXT
#   sasl.mechanism=PLAIN
#   sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka_user" password="kafka@123456";
#   EOF
#
#   # --- Kiểm tra cluster (danh sách broker) ---
#   /opt/kafka/bin/kafka-broker-api-versions.sh \
#     --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092 \
#     --command-config /tmp/client.properties
#
#   # --- Liệt kê topic ---
#   /opt/kafka/bin/kafka-topics.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --list
#
#   # --- Tạo topic ---
#   /opt/kafka/bin/kafka-topics.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --create --topic my-topic \
#     --partitions 3 --replication-factor 3
#
#   # --- Xem chi tiết topic ---
#   /opt/kafka/bin/kafka-topics.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --describe --topic my-topic
#
#   # --- Xóa topic ---
#   /opt/kafka/bin/kafka-topics.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --delete --topic my-topic
#
#   # --- Gửi message (producer) ---
#   /opt/kafka/bin/kafka-console-producer.sh \
#     --bootstrap-server kafka-1:9092 \
#     --producer.config /tmp/client.properties \
#     --topic my-topic
#
#   # --- Đọc message (consumer, từ đầu) ---
#   /opt/kafka/bin/kafka-console-consumer.sh \
#     --bootstrap-server kafka-1:9092 \
#     --consumer.config /tmp/client.properties \
#     --topic my-topic --from-beginning
#
#   # --- Liệt kê consumer group ---
#   /opt/kafka/bin/kafka-consumer-groups.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --list
#
#   # --- Xem offset / lag của consumer group ---
#   /opt/kafka/bin/kafka-consumer-groups.sh \
#     --bootstrap-server kafka-1:9092 \
#     --command-config /tmp/client.properties \
#     --describe --group <group-id>
#
# =============================================================================
# SPRING BOOT — application.properties:
#   spring.kafka.bootstrap-servers=kafka-1:9092,kafka-2:9092,kafka-3:9092
#   spring.kafka.properties.security.protocol=SASL_PLAINTEXT
#   spring.kafka.properties.sasl.mechanism=PLAIN
#   spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka_user" password="kafka@123456";
#
# ĐỔI PASSWORD: cập nhật cả .env lẫn config/kafka-jaas.conf
# =============================================================================

services:
  kafka-1:
    image: apache/kafka:latest
    container_name: kafka-1
    restart: unless-stopped
    ports:
      - "19092:19092"    # broker-1 expose ra host
    environment:
      # --- KRaft: Node identity ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Danh sách tất cả controller trong cluster (cố định, không đổi)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      # UUID duy nhất cho cluster, generate 1 lần và giữ nguyên mãi
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # --- Listeners ---
      # 9092: client kết nối (SASL), 9093: controller nội bộ (PLAINTEXT)
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- SASL Authentication ---
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      # Trỏ JVM đến JAAS config (BẮT BUỘC — configure script kiểm tra biến này)
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.conf"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_1_data:/var/lib/kafka/data
      # Mount JAAS config (chứa username/password cho SASL/PLAIN)
      - ./config/kafka-jaas.conf:/opt/kafka/config/kafka-jaas.conf:ro
    networks:
      - iam-internal-network

  kafka-2:
    image: apache/kafka:latest
    container_name: kafka-2
    restart: unless-stopped
    ports:
      - "19093:19093"    # broker-2 expose ra host
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19093,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:9092,EXTERNAL://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.conf"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_2_data:/var/lib/kafka/data
      - ./config/kafka-jaas.conf:/opt/kafka/config/kafka-jaas.conf:ro
    networks:
      - iam-internal-network

  kafka-3:
    image: apache/kafka:latest
    container_name: kafka-3
    restart: unless-stopped
    ports:
      - "19094:19094"    # broker-3 expose ra host
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:9092,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.conf"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_3_data:/var/lib/kafka/data
      - ./config/kafka-jaas.conf:/opt/kafka/config/kafka-jaas.conf:ro
    networks:
      - iam-internal-network
