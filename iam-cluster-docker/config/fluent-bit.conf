# ════════════════════════════════════════════════════════════════════════════
# FLUENT BIT — Log forwarder cho IAM cluster
#
# PIPELINE TỔNG QUÁT:
#   Spring Boot service
#     → logback-spring.xml (LogstashTcpSocketAppender)
#     → TCP port 5044 (JSON format, có field "service")
#     → Fluent Bit [INPUT] gắn Tag
#     → Fluent Bit [FILTER] phân luồng theo Tag (nếu nhiều hệ thống)
#     → Fluent Bit [OUTPUT] gửi vào đúng ES index
#     → Kibana Data View hiển thị
#
# CÁC KHÁI NIỆM CHÍNH:
#   - Tag    : nhãn gắn vào mỗi record khi vào INPUT. VD: "iam.logs"
#   - Match  : OUTPUT chỉ xử lý record có Tag khớp pattern. VD: "iam.*"
#   - Index  : tên index trong Elasticsearch nhận dữ liệu
#   - rewrite_tag: FILTER đổi Tag dựa trên nội dung field JSON
#     → dùng để tách 1 luồng INPUT thành nhiều luồng → nhiều index khác nhau
#
# HIỆN TẠI (chỉ có IAM system):
#   1 INPUT (port 5044) → Tag=iam.logs → 1 OUTPUT → Index=logs-iam
#   Không cần FILTER vì chỉ có 1 hệ thống, không cần phân luồng.
#
# KHI THÊM HỆ THỐNG MỚI (xem hướng dẫn ở cuối file):
#   1 INPUT (port 5044) → Tag=iam.logs
#     → FILTER rewrite_tag (đọc field "service" trong JSON)
#       - service=iam-*         → giữ nguyên Tag "iam.logs"    → Output → logs-iam
#       - service=demo-app-*    → đổi Tag thành "demo.logs"    → Output → logs-demo-app
# ════════════════════════════════════════════════════════════════════════════

[SERVICE]
    Flush         1
    Log_Level     warn
    Parsers_File  parsers.conf

# ── INPUT ────────────────────────────────────────────────────────────────────
# Nhận log từ tất cả Spring Boot services qua TCP port 5044 (JSON format).
# logback-spring.xml của mỗi service trỏ destination vào localhost:5044.
# Tất cả log đều vào đây, được gắn Tag "iam.logs" để OUTPUT nhận biết.
[INPUT]
    Name          tcp
    Listen        0.0.0.0
    Port          5044
    Format        json
    Tag           iam.logs
    # buffer 10 MB — đủ cho burst log lúc startup
    Buffer_Size   10240

# ── FILTER ───────────────────────────────────────────────────────────────────
# Tách log của change-app-service ra tag riêng "change.logs"
# để đẩy vào ES index riêng "logs-change-app".
# Rule: đọc field "service" trong JSON → nếu khớp → đổi tag, xóa khỏi tag cũ (false).
[FILTER]
    Name          rewrite_tag
    Match         iam.logs
    Rule          $service  ^change-app-service$  change.logs  false

# ── OUTPUT ───────────────────────────────────────────────────────────────────
# Gửi tất cả record có Tag khớp "iam.*" vào ES index "logs-iam".
# Index="logs-iam" → ES tự tạo index này khi nhận document đầu tiên.
# Kibana cần tạo Data View "logs-iam*" để query index này.
[OUTPUT]
    Name                es
    Match               iam.*
    Host                elasticsearch
    Port                9200
    Index               logs-iam
    HTTP_User           elastic
    HTTP_Passwd         ${ES_PASSWORD}
    tls                 Off
    Suppress_Type_Name  On
    Time_Key            @timestamp
    Time_Key_Nanos      Off
    Replace_Dots        On
    # retry khi ES chưa sẵn sàng
    Retry_Limit         5

# Gửi log change-app-service vào ES index riêng "logs-change-app".
# Kibana cần tạo Data View "logs-change-app*" để query.
[OUTPUT]
    Name                es
    Match               change.*
    Host                elasticsearch
    Port                9200
    Index               logs-change-app
    HTTP_User           elastic
    HTTP_Passwd         ${ES_PASSWORD}
    tls                 Off
    Suppress_Type_Name  On
    Time_Key            @timestamp
    Time_Key_Nanos      Off
    Replace_Dots        On
    Retry_Limit         5

# ════════════════════════════════════════════════════════════════════════════
# HƯỚNG DẪN: THÊM HỆ THỐNG MỚI (index riêng trên ES)
#
# Giả sử thêm "demo-app-service" → muốn log vào index "logs-demo-app".
# Trong logback-spring.xml của demo-app-service phải có:
#   <customFields>{"service": "demo-app-service"}</customFields>
#
# Bước 1 — Thêm FILTER rewrite_tag (đặt TRƯỚC OUTPUT):
#
#   [FILTER]
#       Name          rewrite_tag
#       Match         iam.logs
#       Rule          $service  ^demo-app-service$  demo.logs  false
#       #              ↑              ↑                  ↑        ↑
#       #           field JSON   regex match        tag mới   false=xóa khỏi tag cũ
#       #                                                      true =giữ ở cả 2 tag
#
# Bước 2 — Thêm OUTPUT mới cho tag "demo.*":
#
#   [OUTPUT]
#       Name                es
#       Match               demo.*
#       Host                elasticsearch
#       Port                9200
#       Index               logs-demo-app
#       HTTP_User           elastic
#       HTTP_Passwd         ${ES_PASSWORD}
#       tls                 Off
#       Suppress_Type_Name  On
#       Time_Key            @timestamp
#       Replace_Dots        On
#       Retry_Limit         5
#
# Bước 3 — Restart Fluent Bit để apply config mới:
#   docker compose -f docker-compose.yml -f docker-compose.fluent-bit.yml restart fluent-bit
#
# Bước 4 — Tạo Data View mới trong Kibana UI:
#   Stack Management → Data Views → Create → "logs-demo-app*" (timestamp: @timestamp)
#
# LƯU Ý: Không cần thêm INPUT mới. Mọi service đều gửi vào cùng port 5044.
#         Fluent Bit phân luồng dựa trên field "service" trong JSON payload.
# ════════════════════════════════════════════════════════════════════════════
