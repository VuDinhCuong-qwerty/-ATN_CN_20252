// JAAS config cho Kafka SASL/PLAIN
// Giữ đồng bộ với file .env khi đổi password

KafkaServer {
    org.apache.kafka.common.security.plain.PlainLoginModule required
    // Inter-broker: credential broker dùng để xác thực lẫn nhau
    username="kafka_interbroker"
    password="interbroker@123456"
    // Danh sách user được phép kết nối (user_<name>="<password>")
    user_kafka_user="kafka@123456"
    user_kafka_interbroker="interbroker@123456";
};
