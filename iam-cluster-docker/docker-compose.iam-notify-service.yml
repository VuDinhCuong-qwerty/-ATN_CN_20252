services:
  iam-notify-service:
    image: iam-notify-service:latest
    container_name: iam-notify-service
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # ── Tự động lấy từ .env / cluster — không cần sửa ──────────────────────
      - DB_URL=jdbc:oracle:thin:@//host.docker.internal:1521/AUTHPDB1
      - KAFKA_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      # ── ⚠️  PHẢI TỰ ĐIỀN trước khi chạy service ──────────────────────────
      # Gmail App Password (không phải password Gmail thường):
      #   Tạo tại: https://myaccount.google.com/apppasswords
      - MAIL_USERNAME=${MAIL_USERNAME}         # vd: your-email@gmail.com
      - MAIL_PASSWORD=${MAIL_PASSWORD}         # vd: abcd efgh ijkl mnop
      # ── Có thể giữ default hoặc tuỳ chỉnh ──────────────────────────────────
      - MAIL_FROM=${MAIL_FROM:-noreply@iam-banking.vn}
      - PORTAL_URL=${PORTAL_URL:-http://localhost:4200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - iam-internal-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/iam-notify-service/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =============================================================================
# Thêm vào iam-cluster-docker/.env trước khi chạy:
#
#   MAIL_USERNAME=your-email@gmail.com
#   MAIL_PASSWORD=your-gmail-app-password
#
# (MAIL_FROM và PORTAL_URL có default, không bắt buộc)
# =============================================================================
#
# Build & chạy:
#   cd ../iam-notify-service
#   mvn clean package -DskipTests
#   docker build -t iam-notify-service:latest .
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.kafka.yml \
#     -f docker-compose.iam-notify-service.yml \
#     up -d
