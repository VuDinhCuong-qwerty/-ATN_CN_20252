<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/template/default/username_password/login.css}" />
</head>
<body>

<!-- ════════════ LEFT PANEL ════════════ -->
<div class="left-panel">

    <!-- Navbar with Logo -->
    <header class="navbar">
        <div class="logo-wrap">
            <img th:src="@{/template/default/username_password/img/logo.png}" alt="Logo" />
        </div>
    </header>

    <!-- Sub-header bar -->
    <div class="subheader"></div>

    <!-- Main content area -->
    <main class="main-content">
        <h1 class="welcome-title">WELCOME BACK!</h1>
        <!-- Divider dưới tiêu đề -->
        <div class="title-divider"></div>

        <div class="form-card">

            <!-- Login Form -->
            <form th:action="@{/ms-internal-iam/auth/login}" method="post" id="loginForm">

                <!-- Hidden fields -->
                <!-- sessionToken is an HMAC of the server-side authSessionId; the real ID never leaves the server -->
                <input type="hidden" name="sessionToken" th:value="${sessionToken}" />
                <input type="hidden" name="type"         th:value="${type}" />
                <input type="hidden" name="clientId"      th:value="${clientId}" />

                <!-- Username -->
                <div class="input-group">
                    <label class="input-label" for="username">Tên đăng nhập</label>
                    <input
                            id="username"
                            class="input-field"
                            type="text"
                            name="payload[username]"
                            placeholder="Nhập tên đăng nhập..."
                            autocomplete="username"
                            required
                    />
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label class="input-label" for="password">Mật khẩu</label>
                    <input
                            id="password"
                            class="input-field"
                            type="password"
                            name="payload[password]"
                            placeholder="Nhập mật khẩu..."
                            autocomplete="current-password"
                            required
                    />
                </div>

                <!-- Error message — nằm giữa password và nút -->
                <div class="error-box" th:if="${errorDesc}">
                    <div class="error-icon"></div>
                    <div>
                        <p class="error-text" th:text="${errorDesc}"></p>
                        <small class="error-code" th:if="${errorCode}" th:text="'(' + ${errorCode} + ')'"></small>
                    </div>
                </div>

                <!-- Divider ngăn cách cụm nhập liệu và nút -->
                <div class="section-divider"></div>

                <!-- Buttons: logic theo sessionToken -->
                <!-- sessionToken null: chỉ hiện nút Đăng nhập ở giữa -->
                <div class="btn-row" th:if="${sessionToken == null}">
                    <button type="submit" class="btn btn-filled">Đăng nhập</button>
                </div>

                <!-- sessionToken không null: hiện cả 2 nút -->
                <div class="btn-row btn-row--two" th:if="${sessionToken != null}">
                    <button type="submit" class="btn btn-filled">Đăng nhập</button>
                    <button type="submit" class="btn btn-outline"
                            form="switchMethodForm">Cách khác</button>
                </div>

            </form>

            <!-- Form switch method — chỉ render khi sessionToken không null -->
            <form th:if="${sessionToken != null}"
                  id="switchMethodForm"
                  th:action="@{/ms-internal-iam/auth/switch-method}"
                  method="post">
                <input type="hidden" name="clientId"      th:value="${clientId}" />
                <input type="hidden" name="sessionToken"  th:value="${sessionToken}" />
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Bản quyền thuộc về Đại học Bách khoa Hà Nội.</p>
    </footer>

</div>

<!-- ════════════ RIGHT PANEL ════════════ -->
<div class="right-panel">
    <img th:src="@{/template/default/username_password/img/auth.png}" alt="Fintech illustration" />
</div>

<script th:src="@{/template/default/username_password/login.js}"></script>
</body>
</html>
