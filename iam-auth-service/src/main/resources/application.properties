spring.application.name=iam-auth-service
server.port=8888

# Oracle
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/AUTHPDB1
spring.datasource.username=auth_user1
spring.datasource.password=Auth123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis@123456
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

# thymeleaf
spring.thymeleaf.enabled=true

# Kafka
kafka.bootstrap-servers=localhost:19092,localhost:19093,localhost:19094
kafka.sasl.username=kafka_user
kafka.sasl.password=kafka@123456

# JWT
#jwt.secret=${JWT_SECRET:your-secret-key-must-be-at-least-32-characters}
#jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900}
#jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:86400}

# MFA
mfa.otp.expiry-seconds=${MFA_OTP_EXPIRY:300}
mfa.otp.length=${MFA_OTP_LENGTH:6}
mfa.max-failed-attempts=${MFA_MAX_FAILED:5}

# Account lockout
auth.max-failed-attempts=${AUTH_MAX_FAILED:5}
auth.lockout-duration-minutes=${AUTH_LOCKOUT_DURATION:30}



# Session token HMAC secret — override in production via SESSION_TOKEN_SECRET env var
# Must be at least 32 characters
session.token.secret=${SESSION_TOKEN_SECRET:change-me-in-production-must-be-32c}

# Auth service
auth.issuer=${AUTH_ISSUER:http://localhost:8888/ms-internal-iam/auth}
auth.base-url=${AUTH_BASE_URL:http://localhost:8888}
auth.endpoints.authorize=/ms-internal-iam/auth/authorize
auth.endpoints.login=/ms-internal-iam/auth/login
auth.endpoints.login-page=/ms-internal-iam/auth/internal/login-action
auth.endpoints.token=/ms-internal-iam/auth/token
auth.endpoints.jwks=/ms-internal-iam/auth/jwks
auth.endpoints.userinfo=/ms-internal-iam/auth/userinfo
auth.endpoints.logout=/ms-internal-iam/auth/logout
auth.endpoints.introspect=/ms-internal-iam/auth/token/introspect
auth.endpoints.revoke=/ms-internal-iam/auth/token/revoke
auth.endpoints.well-known=/ms-internal-iam/auth/.well-known/openid-configuration

# Signing key jobs
cron.job.key.rotate=0 0 12 * * ?
cron.job.key.cleanup=0 5 12 * * ?

## Logging
#logging.level.com.iam=DEBUG
#logging.level.org.springframework.security=DEBUG
